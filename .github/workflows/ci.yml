name: TurboCompress CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request: 
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd backend && npm install
          cd ../frontend && npm install

      - name: Run Backend Smoke Test
        # This will FAIL the pipeline if the test fails!
        run: cd backend && npm test 

      - name: Run Frontend Build Check
        # Fast way to test if frontend is broken
        run: cd frontend && npm run build
  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repo Name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # ... (rest of your file stays the same until the build steps)
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy
          tags: ghcr.io/${{ env.REPO_LOWER }}/backend:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy
          tags: ghcr.io/${{ env.REPO_LOWER }}/worker:latest
# ...